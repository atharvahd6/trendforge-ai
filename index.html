<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendForge-AI | Complete Functional Startup Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #151D30;
            --accent: #38BDF8;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem 2rem;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38BDF8, #818CF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 2rem auto;
        }
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 4rem 2rem;
        }
        #journal-container {
            background-color: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 2rem;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th { color: var(--accent); font-weight: 600; }
        a { color: #818CF8; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <h1>TrendForge Venture Lab</h1>
        <p class="subtitle">Every 24 hours, this lab deploys a 100% complete, functional, ready-to-use web tool to solve real digital constraints immediately.</p>
    </header>

    <main>
        <h2>📚 Operational Live Product Ledger</h2>
        <div id="journal-container">
            <p style="color: var(--text-muted);">Syncing complete product systems layout columns...</p>
        </div>
    </main>

    <script>
        fetch('MASTER_TREND_JOURNAL.md')
            .then(response => response.text())
            .then(markdownText => {
                document.getElementById('journal-container').innerHTML = marked.parse(markdownText);
            })
            .catch(err => {
                document.getElementById('journal-container').innerHTML = "<p style='color:#EF4444;'>Sync error initializing product ledger matrix.</p>";
            });
    </script>
</body>
</html>
