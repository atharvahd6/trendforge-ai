name: Autonomous Multi-AI Trend Loop

on:
  schedule:
    - cron: '0 6 * * *' # Runs daily at 6 AM UTC
  workflow_dispatch:   # Re-enables manual run trigger button

permissions:
  contents: write

jobs:
  run-marketing-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches full history to prevent rebase issues

    - name: Set up Python Workspace
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies securely
      run: |
        python -m pip install --upgrade pip
        pip install google-genai openai cohere mistralai

    - name: Run Core Optimization Factory Loop
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python agent.py

    - name: Commit and Save Historical Records Safely
      run: |
        git config --global user.name "AI-History-Bot"
        git config --global user.email "history@saas-bot.local"
        
        # Pull updates safely to prevent overlaps
        git pull origin main --rebase || true
        
        # Only stage and commit if your script successfully generated updates
        git add archived_trends/* MASTER_TREND_JOURNAL.md products/* index.html || true
        
        if git diff --staged --quiet; then
          echo "No structural product changes detected to push on this cycle."
        else
          git commit -m "🚀 Complete Systems Launch: Deployed functional web utility [skip ci]"
          git push origin main
        fi
