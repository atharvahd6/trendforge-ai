name: Autonomous Multi-AI Trend Loop

on:
  schedule:
    - cron: '0 6 * * *' # Runs automatically every single day at 6:00 AM UTC
  workflow_dispatch:   # Manual test button

permissions:
  contents: write
  models: read        # 🔑 FIXED: This grants your GITHUB_TOKEN explicit access to the free AI models!

jobs:
  run-marketing-engine:
    runs-on: ubuntu-latest
# ... (rest of the file stays exactly the same)
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Load Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch Core Libraries
      run: pip install groq google-genai openai cohere mistralai

    - name: Run Optimization Loop
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python agent.py

   - name: Commit and Save Historical Records
      run: |
        git config --global user.name "AI-History-Bot"
        git config --global user.email "history@saas-bot.local"
        
        git stash --include-untracked || true
        git pull origin main --rebase
        git stash pop || true
        
        # 🔑 Stage all new functional applications and record timelines
        git add archived_trends/* MASTER_TREND_JOURNAL.md products/* || true
        
        git commit -m "🚀 Complete Systems Launch: Deployed functional web utility [skip ci]" || true
        git push origin main
