name: TrendForge AI Autopilot Factory

on:
  schedule:
    # Triggers autonomously every single day at 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the agent with a button inside GitHub Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Grants write access to your repository so the bot can commit code
    permissions:
      contents: write

    steps:
    # 1. Pull down the repository files
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: main

    # 2. Set up a secure Python runtime environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up sequential builds

    # 3. Install required framework SDKs
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai groq mistralai

    # 4. Execute the Python agent with API environment variables injected safely
    - name: Run Autonomous Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      run: |
        python agent.py

    # 5. DELIVERY METHOD A: Commit and Push the code directly back into your main branch
    - name: Commit and Push New Products to Repository
      run: |
        git config --global user.name "TrendForge Bot"
        git config --global user.email "bot@trendforge.ai"
        
        # Check if the products directory exists and has updates
        if [ -d "products" ]; then
          git add products/
          # Only commit if changes or new files exist, avoiding workflow errors
          git diff-index --quiet HEAD || git commit -m "🤖 Auto-deployed new enterprise desktop tool"
          git push origin main
        else
          echo "No products folder found to commit."
        fi

    # 6. DELIVERY METHOD B: Bundle the generated apps into a downloadable .zip archive
    - name: Upload Desktop App as Downloadable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: enterprise-desktop-tools-${{ github.run_number }}
        path: products/
        if-no-files-found: warn
