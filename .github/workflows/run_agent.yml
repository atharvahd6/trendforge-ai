name: TrendForge Daily Agent Run

on:
  schedule:
    # Runs once a day at 03:00 UTC (~08:30 IST)
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TrendForge agent pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python agent.py

      - name: Commit and push new product output
        run: |
          git config user.name "trendforge-bot"
          git config user.email "actions@github.com"
          git add products/ MASTER_TREND_JOURNAL.md manual_ideas.txt
          if git diff --staged --quiet; then
            echo "No new files generated — nothing to commit."
          else
            git commit -m "TrendForge: auto-generated product run ($(date -u +'%Y-%m-%d'))"
            git push
          fi
