name: Autonomous Multi-AI Trend Loop

on:
  schedule:
    - cron: '0 6 * * *' # Runs daily at 6 AM UTC
  workflow_dispatch:   # 🔑 Re-enables the manual play button!

permissions:
  contents: write
  models: read

jobs:
  run-marketing-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Workspace
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Framework Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai openai cohere mistralai

    - name: Run Core Optimization Factory Loop
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python agent.py

    - name: Commit and Save Historical Records
      run: |
        git config --global user.name "AI-History-Bot"
        git config --global user.email "history@saas-bot.local"
        
        git stash --include-untracked || true
        git pull origin main --rebase
        git stash pop || true
        
        git add archived_trends/* MASTER_TREND_JOURNAL.md products/* index.html || true
        git commit -m "🚀 Complete Systems Launch: Deployed functional web utility [skip ci]" || true
        git push origin main
