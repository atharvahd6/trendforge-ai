<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibility Checker for E-Learning Course Creators</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1em;
            text-align: center;
        }
        main {
            max-width: 800px;
            margin: 2em auto;
            padding: 1em;
            background-color: #444;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        section {
            width: 100%;
            margin-bottom: 1em;
        }
        label {
            display: block;
            margin-bottom: 0.5em;
        }
        input[type="text"], input[type="url"], input[type="email"] {
            width: 100%;
            padding: 0.5em;
            margin-bottom: 1em;
            border: none;
            border-radius: 5px;
            background-color: #555;
            color: #fff;
        }
        input[type="checkbox"] {
            margin-right: 0.5em;
        }
        button {
            background-color: #666;
            color: #fff;
            padding: 0.5em 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0.5em 0;
        }
        #results {
            width: 100%;
            margin-top: 1em;
            padding: 1em;
            background-color: #555;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: none;
        }
        #modal {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #modal > div {
            background-color: #444;
            color: #fff;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Accessibility Checker for E-Learning Course Creators</h1>
    </header>
    <main>
        <section>
            <h2>Course Information</h2>
            <label for="course-name">Course Name:</label>
            <input type="text" id="course-name">
            <label for="course-url">Course URL:</label>
            <input type="url" id="course-url">
        </section>
        <section>
            <h2>Accessibility Checks</h2>
            <label>
                <input type="checkbox" id="screen-reader">
                Screen Reader Compatibility
            </label>
            <label>
                <input type="checkbox" id="closed-captions">
                Closed Captions
            </label>
            <label>
                <input type="checkbox" id="color-contrast">
                Color Contrast
            </label>
        </section>
        <button id="check-accessibility">Check Accessibility</button>
        <button id="get-recommendations" style="display: none;">Get Recommendations</button>
        <div id="results"></div>
        <button id="lead-capture" style="display: none;">Get Started</button>
        <div id="modal">
            <div>
                <h2>Get Started with Accessibility Checker</h2>
                <label for="name">Name:</label>
                <input type="text" id="name">
                <label for="email">Email:</label>
                <input type="email" id="email">
                <button id="submit-lead">Submit</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const courseNameInput = document.getElementById('course-name');
            const courseUrlInput = document.getElementById('course-url');
            const screenReaderCheckbox = document.getElementById('screen-reader');
            const closedCaptionsCheckbox = document.getElementById('closed-captions');
            const colorContrastCheckbox = document.getElementById('color-contrast');
            const checkAccessibilityButton = document.getElementById('check-accessibility');
            const getRecommendationsButton = document.getElementById('get-recommendations');
            const resultsDiv = document.getElementById('results');
            const leadCaptureButton = document.getElementById('lead-capture');
            const modal = document.getElementById('modal');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const submitLeadButton = document.getElementById('submit-lead');

            // Check for localStorage support
            const storageAvailable = (type) => {
                try {
                    const storage = window[type];
                    const x = '__storage_test__';
                    storage.setItem(x, x);
                    storage.removeItem(x);
                    return true;
                } catch(e) {
                    return false;
                }
            };

            checkAccessibilityButton.addEventListener('click', () => {
                const courseName = courseNameInput.value.trim();
                const courseUrl = courseUrlInput.value.trim();
                const screenReader = screenReaderCheckbox.checked;
                const closedCaptions = closedCaptionsCheckbox.checked;
                const colorContrast = colorContrastCheckbox.checked;

                if (!courseName || !courseUrl) {
                    alert('Please fill in both Course Name and Course URL');
                    return;
                }

                if (storageAvailable('localStorage')) {
                    localStorage.setItem('courseName', courseName);
                    localStorage.setItem('courseUrl', courseUrl);
                    localStorage.setItem('screenReader', screenReader);
                    localStorage.setItem('closedCaptions', closedCaptions);
                    localStorage.setItem('colorContrast', colorContrast);
                }

                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = `
                    <h2>Accessibility Check Results</h2>
                    <p>Course Name: ${courseName}</p>
                    <p>Course URL: ${courseUrl}</p>
                    <p>Screen Reader Compatibility: ${screenReader ? 'Yes' : 'No'}</p>
                    <p>Closed Captions: ${closedCaptions ? 'Yes' : 'No'}</p>
                    <p>Color Contrast: ${colorContrast ? 'Yes' : 'No'}</p>
                `;

                getRecommendationsButton.style.display = 'block';
            });

            getRecommendationsButton.addEventListener('click', () => {
                leadCaptureButton.style.display = 'block';
            });

            leadCaptureButton.addEventListener('click', () => {
                modal.style.display = 'flex';
            });

            submitLeadButton.addEventListener('click', async () => {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();

                if (!name || !email) {
                    alert('Please fill in both Name and Email');
                    return;
                }

                try {
                    const response = await fetch('https://salarybit.in/api/v1/lead-intake', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: name,
                            email: email,
                            productConcept: 'Accessibility Checker for E-Learning Course Creators'
                        })
                    });

                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }

                    const data = await response.json();
                    console.log('Success:', data);
                    alert('Thank you for your submission!');
                    modal.style.display = 'none';
                    nameInput.value = '';
                    emailInput.value = '';
                } catch (error) {
                    console.error('Error:', error);
                    alert('There was an error submitting your information. Please try again.');
                }
            });

            if (storageAvailable('localStorage')) {
                const courseName = localStorage.getItem('courseName');
                const courseUrl = localStorage.getItem('courseUrl');
                const screenReader = localStorage.getItem('screenReader');
                const closedCaptions = localStorage.getItem('closedCaptions');
                const colorContrast = localStorage.getItem('colorContrast');

                if (courseName && courseUrl && screenReader !== null && closedCaptions !== null && colorContrast !== null) {
                    courseNameInput.value = courseName;
                    courseUrlInput.value = courseUrl;
                    screenReaderCheckbox.checked = screenReader === 'true';
                    closedCaptionsCheckbox.checked = closedCaptions === 'true';
                    colorContrastCheckbox.checked = colorContrast === 'true';
                }
            }
        });
    </script>
</body>
</html>
