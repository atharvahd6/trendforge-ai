<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Content Repurposer</title>
    <style>
        body {
            background-color: #333;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #444;
            padding: 1em;
            text-align: center;
        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2em;
        }
        section {
            background-color: #555;
            padding: 1em;
            margin: 1em;
            border-radius: 0.5em;
            box-shadow: 0 0 1em rgba(0, 0, 0, 0.5);
            width: 80%;
            max-width: 600px;
        }
        h1, h2 {
            color: #fff;
            margin: 0 0 0.5em 0;
        }
        textarea, select, input[type="text"], input[type="email"], input[type="date"], input[type="time"] {
            width: 100%;
            padding: 0.5em;
            margin: 0.5em 0;
            border: none;
            border-radius: 0.5em;
            box-shadow: 0 0 1em rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }
        button {
            background-color: #666;
            color: #fff;
            padding: 0.5em 1em;
            border: none;
            border-radius: 0.5em;
            cursor: pointer;
            margin: 0.5em 0;
        }
        button:hover {
            background-color: #777;
        }
        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }
        #lead-capture-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #555;
            padding: 1em;
            border-radius: 0.5em;
            box-shadow: 0 0 1em rgba(0, 0, 0, 0.5);
            z-index: 1000;
            width: 80%;
            max-width: 400px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }
        .error-message {
            color: #ff6b6b;
            font-size: 0.8em;
            margin-top: -0.5em;
            margin-bottom: 0.5em;
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="modal-overlay"></div>
    <header>
        <h1>Micro-Content Repurposer</h1>
    </header>
    <main>
        <section>
            <h2>Content Analysis</h2>
            <textarea id="content-library" placeholder="Enter your content library" aria-label="Content library input"></textarea>
            <button id="analyze-button">Analyze</button>
            <div id="analysis-results" aria-live="polite"></div>
        </section>
        <section>
            <h2>Repurposing Suggestions</h2>
            <select id="repurpose-type" aria-label="Repurpose type selection">
                <option value="tiktok-to-twitter">TikTok to Twitter Thread</option>
                <option value="instagram-to-youtube">Instagram Reel to YouTube Short</option>
            </select>
            <button id="repurpose-button">Repurpose</button>
            <div id="repurpose-results" aria-live="polite"></div>
        </section>
        <section>
            <h2>Cross-Platform Optimization</h2>
            <select id="platform" aria-label="Platform selection">
                <option value="twitter">Twitter</option>
                <option value="instagram">Instagram</option>
                <option value="youtube">YouTube</option>
            </select>
            <button id="optimize-button">Optimize</button>
            <div id="optimize-results" aria-live="polite"></div>
        </section>
        <section>
            <h2>Scheduling Integration</h2>
            <input id="schedule-date" type="date" aria-label="Schedule date">
            <input id="schedule-time" type="time" aria-label="Schedule time">
            <button id="schedule-button">Schedule</button>
        </section>
        <button id="lead-capture-button">Get Started</button>
        <div id="lead-capture-modal" style="display: none;" role="dialog" aria-modal="true">
            <h2>Get Started with Micro-Content Repurposer</h2>
            <input id="name" type="text" placeholder="Name" aria-label="Name input">
            <div id="name-error" class="error-message" style="display: none;">Please enter your name</div>
            <input id="email" type="email" placeholder="Email" aria-label="Email input">
            <div id="email-error" class="error-message" style="display: none;">Please enter a valid email</div>
            <button id="submit-lead">Submit</button>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentLibrary = document.getElementById('content-library');
            const analyzeButton = document.getElementById('analyze-button');
            const analysisResults = document.getElementById('analysis-results');
            const repurposeType = document.getElementById('repurpose-type');
            const repurposeButton = document.getElementById('repurpose-button');
            const repurposeResults = document.getElementById('repurpose-results');
            const platform = document.getElementById('platform');
            const optimizeButton = document.getElementById('optimize-button');
            const optimizeResults = document.getElementById('optimize-results');
            const scheduleDate = document.getElementById('schedule-date');
            const scheduleTime = document.getElementById('schedule-time');
            const scheduleButton = document.getElementById('schedule-button');
            const leadCaptureButton = document.getElementById('lead-capture-button');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const modalOverlay = document.getElementById('modal-overlay');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const submitLeadButton = document.getElementById('submit-lead');
            const nameError = document.getElementById('name-error');
            const emailError = document.getElementById('email-error');

            function showModal() {
                leadCaptureModal.style.display = 'block';
                modalOverlay.style.display = 'block';
                document.body.style.overflow = 'hidden';
            }

            function hideModal() {
                leadCaptureModal.style.display = 'none';
                modalOverlay.style.display = 'none';
                document.body.style.overflow = '';
            }

            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            function showError(element, message) {
                element.textContent = message;
                element.style.display = 'block';
            }

            function hideError(element) {
                element.style.display = 'none';
            }

            analyzeButton.addEventListener('click', () => {
                try {
                    const content = contentLibrary.value.trim();
                    if (!content) {
                        analysisResults.textContent = 'Please enter some content to analyze';
                        return;
                    }

                    analysisResults.textContent = 'Analyzing content...';

                    try {
                        localStorage.setItem('content-library', content);
                        analysisResults.textContent = 'Content analysis complete. Results saved.';
                    } catch (e) {
                        console.error('LocalStorage error:', e);
                        analysisResults.textContent = 'Content analysis complete. Could not save results to browser storage.';
                    }
                } catch (error) {
                    console.error('Analysis error:', error);
                    analysisResults.textContent = 'An error occurred during analysis';
                }
            });

            repurposeButton.addEventListener('click', () => {
                try {
                    const type = repurposeType.value;
                    const content = contentLibrary.value.trim();

                    if (!content) {
                        repurposeResults.textContent = 'Please enter some content to repurpose';
                        return;
                    }

                    repurposeResults.textContent = `Repurposing content as ${type.replace('-', ' to ')}...`;
                    setTimeout(() => {
                        repurposeResults.textContent = 'Content repurposed successfully!';
                    }, 1000);
                } catch (error) {
                    console.error('Repurposing error:', error);
                    repurposeResults.textContent = 'An error occurred during repurposing';
                }
            });

            optimizeButton.addEventListener('click', () => {
                try {
                    const platformValue = platform.value;
                    const content = contentLibrary.value.trim();

                    if (!content) {
                        optimizeResults.textContent = 'Please enter some content to optimize';
                        return;
                    }

                    optimizeResults.textContent = `Optimizing content for ${platformValue}...`;
                    setTimeout(() => {
                        optimizeResults.textContent = `Content optimized for ${platformValue}!`;
                    }, 1000);
                } catch (error) {
                    console.error('Optimization error:', error);
                    optimizeResults.textContent = 'An error occurred during optimization';
                }
            });

            scheduleButton.addEventListener('click', () => {
                try {
                    const date = scheduleDate.value;
                    const time = scheduleTime.value;
                    const content = contentLibrary.value.trim();

                    if (!date || !time) {
                        alert('Please select both date and time');
                        return;
                    }

                    if (!content) {
                        alert('Please enter some content to schedule');
                        return;
                    }

                    console.log('Scheduled content for', date, time);
                    alert('Content scheduled successfully!');
                } catch (error) {
                    console.error('Scheduling error:', error);
                    alert('An error occurred while scheduling');
                }
            });

            leadCaptureButton.addEventListener('click', showModal);

            modalOverlay.addEventListener('click', hideModal);

            submitLeadButton.addEventListener('click', async () => {
                try {
                    const name = nameInput.value.trim();
                    const email = emailInput.value.trim();
                    let isValid = true;

                    if (!name) {
                        showError(nameError, 'Please enter your name');
                        isValid = false;
                    } else {
                        hideError(nameError);
                    }

                    if (!email || !validateEmail(email)) {
                        showError(emailError, 'Please enter a valid email');
                        isValid = false;
                    } else {
                        hideError(emailError);
                    }

                    if (!isValid) return;

                    submitLeadButton.disabled = true;
                    submitLeadButton.textContent = 'Submitting...';

                    const payload = {
                        productConcept: 'Micro-Content Repurposer',
                        name,
                        email,
                    };

                    try {
                        const response = await fetch('https://salarybit.in/api/v1/lead-intake', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(payload),
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const data = await response.json();
                        console.log('Lead submission successful:', data);
                        alert('Thank you for your interest! We will contact you soon.');
                        nameInput.value = '';
                        emailInput.value = '';
                        hideModal();
                    } catch (error) {
                        console.error('Lead submission error:', error);
                        alert('There was an error submitting your information. Please try again later.');
                    } finally {
                        submitLeadButton.disabled = false;
                        submitLeadButton.textContent = 'Submit';
                    }
                } catch (error) {
                    console.error('Form submission error:', error);
                    alert('An unexpected error occurred. Please try again.');
                    submitLeadButton.disabled = false;
                    submitLeadButton.textContent = 'Submit';
                }
            });

            window.addEventListener('load', () => {
                try {
                    const storedContent = localStorage.getItem('content-library');
                    if (storedContent) {
                        contentLibrary.value = storedContent;
                    }
                } catch (e) {
                    console.error('LocalStorage error:', e);
                }
            });
        });
    </script>
</body>
</html>
