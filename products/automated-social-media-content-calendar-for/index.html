<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Social Media Content Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        main {
            background-color: #f0f0f0;
            color: #333;
            max-width: 800px;
            margin: 2em auto;
            padding: 1em;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        section {
            margin-bottom: 1em;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 0.5em;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 0.5em;
            margin-bottom: 0.5em;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.5em;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-sizing: border-box;
        }
        button:hover {
            background-color: #555;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #lead-capture-modal > div {
            background-color: #f0f0f0;
            padding: 1em;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <header style="background-color: #333; color: #fff; padding: 1em; text-align: center;">
        <h1>Automated Social Media Content Calendar for Mental Health Professionals</h1>
    </header>
    <main>
        <section>
            <h2>Library of Pre-approved Content</h2>
            <ul>
                <li><input type="checkbox" id="motivational-quotes" /> <label for="motivational-quotes">Motivational Quotes</label></li>
                <li><input type="checkbox" id="mental-health-tips" /> <label for="mental-health-tips">Mental Health Tips</label></li>
                <li><input type="checkbox" id="educational-resources" /> <label for="educational-resources">Educational Resources</label></li>
            </ul>
        </section>
        <section>
            <h2>Content Suggestion Algorithm</h2>
            <select id="area-of-specialty">
                <option value="">Select Area of Specialty</option>
                <option value="anxiety">Anxiety</option>
                <option value="depression">Depression</option>
                <option value="trauma">Trauma</option>
            </select>
            <button id="suggest-content">Suggest Content</button>
        </section>
        <section>
            <h2>Compliance Checker</h2>
            <textarea id="post-content" placeholder="Enter your post content here..."></textarea>
            <button id="check-compliance">Check Compliance</button>
        </section>
        <section>
            <h2>Integration with Social Media Management Tools</h2>
            <select id="social-media-platform">
                <option value="">Select Social Media Platform</option>
                <option value="facebook">Facebook</option>
                <option value="twitter">Twitter</option>
                <option value="instagram">Instagram</option>
            </select>
            <button id="schedule-post">Schedule Post</button>
        </section>
        <section>
            <h2>Analytics</h2>
            <button id="view-analytics">View Analytics</button>
        </section>
        <button id="get-started">Get Started</button>
    </main>
    <div id="lead-capture-modal">
        <div>
            <h2>Get Started with Automated Social Media Content Calendar</h2>
            <input type="text" id="name" placeholder="Name" required />
            <input type="email" id="email" placeholder="Email" required />
            <button id="submit-lead">Submit</button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const suggestContentButton = document.getElementById('suggest-content');
            const checkComplianceButton = document.getElementById('check-compliance');
            const schedulePostButton = document.getElementById('schedule-post');
            const viewAnalyticsButton = document.getElementById('view-analytics');
            const getStartedButton = document.getElementById('get-started');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const submitLeadButton = document.getElementById('submit-lead');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');

            // Load saved checkboxes from localStorage
            try {
                const savedCheckboxes = JSON.parse(localStorage.getItem('checkedCheckboxes')) || [];
                savedCheckboxes.forEach(id => {
                    const checkbox = document.getElementById(id);
                    if (checkbox) checkbox.checked = true;
                });
            } catch (e) {
                console.error('Error loading saved checkboxes:', e);
            }

            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    try {
                        const checkedCheckboxes = Array.from(checkboxes)
                            .filter(checkbox => checkbox.checked)
                            .map(checkbox => checkbox.id);
                        localStorage.setItem('checkedCheckboxes', JSON.stringify(checkedCheckboxes));
                    } catch (e) {
                        console.error('Error saving checkboxes:', e);
                    }
                });
            });

            suggestContentButton.addEventListener('click', () => {
                const areaOfSpecialty = document.getElementById('area-of-specialty').value;
                if (!areaOfSpecialty) {
                    alert('Please select an area of specialty');
                    return;
                }
                console.log(`Suggesting content for ${areaOfSpecialty}`);
                // TO DO: implement content suggestion algorithm
            });

            checkComplianceButton.addEventListener('click', () => {
                const postContent = document.getElementById('post-content').value.trim();
                if (!postContent) {
                    alert('Please enter post content');
                    return;
                }
                console.log(`Checking compliance for: ${postContent}`);
                // TO DO: implement compliance checker
            });

            schedulePostButton.addEventListener('click', () => {
                const socialMediaPlatform = document.getElementById('social-media-platform').value;
                if (!socialMediaPlatform) {
                    alert('Please select a social media platform');
                    return;
                }
                console.log(`Scheduling post on ${socialMediaPlatform}`);
                // TO DO: implement scheduling post
            });

            viewAnalyticsButton.addEventListener('click', () => {
                console.log('Viewing analytics');
                // TO DO: implement analytics
            });

            getStartedButton.addEventListener('click', () => {
                leadCaptureModal.style.display = 'flex';
            });

            submitLeadButton.addEventListener('click', () => {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();

                if (!name || !email) {
                    alert('Please fill in all fields');
                    return;
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    alert('Please enter a valid email address');
                    return;
                }

                const payload = {
                    name,
                    email,
                    productConcept: 'Automated Social Media Content Calendar for Mental Health Professionals'
                };

                fetch('https://salarybit.in/api/v1/lead-intake', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Success:', data);
                    alert('Thank you for your interest! We will contact you soon.');
                    nameInput.value = '';
                    emailInput.value = '';
                    leadCaptureModal.style.display = 'none';
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('There was an error submitting your information. Please try again later.');
                });
            });

            // Close modal when clicking outside
            leadCaptureModal.addEventListener('click', (e) => {
                if (e.target === leadCaptureModal) {
                    leadCaptureModal.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
