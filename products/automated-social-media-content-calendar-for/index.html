<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Social Media Content Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
        }
        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2em;
            background-color: #444;
        }
        section {
            width: 80%;
            margin-bottom: 1em;
            background-color: #555;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        input, textarea, button {
            padding: 0.5em;
            border: none;
            border-radius: 10px;
            width: 100%;
            margin-top: 0.5em;
            box-sizing: border-box;
        }
        button {
            background-color: #666;
            color: #fff;
            cursor: pointer;
            width: auto;
        }
        #template-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #template-list li {
            padding: 0.5em;
            border-bottom: 1px solid #666;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #lead-capture-modal div {
            background-color: #555;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 500px;
        }
        header {
            background-color: #333;
            padding: 1em;
            text-align: center;
        }
        #template-search {
            margin-bottom: 1em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Automated Social Media Content Calendar for Mental Health Professionals</h1>
    </header>
    <main>
        <section>
            <h2>Library of Pre-approved Templates</h2>
            <input type="text" id="template-search" placeholder="Search for templates">
            <ul id="template-list">
                <li>Template 1</li>
                <li>Template 2</li>
                <li>Template 3</li>
            </ul>
        </section>
        <section>
            <h2>Scheduling Feature</h2>
            <input type="date" id="schedule-date">
            <input type="time" id="schedule-time">
            <button id="schedule-button">Schedule Post</button>
        </section>
        <section>
            <h2>Compliance Checker</h2>
            <textarea id="post-content" placeholder="Enter post content" style="height: 100px;"></textarea>
            <button id="check-compliance">Check Compliance</button>
        </section>
        <button id="lead-capture">Get Started</button>
        <div id="lead-capture-modal">
            <div>
                <h2>Get Started</h2>
                <input type="text" id="name" placeholder="Name">
                <input type="email" id="email" placeholder="Email">
                <button id="submit-lead">Submit</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const templateList = document.getElementById('template-list');
            const scheduleButton = document.getElementById('schedule-button');
            const checkCompliance = document.getElementById('check-compliance');
            const leadCapture = document.getElementById('lead-capture');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const submitLead = document.getElementById('submit-lead');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');

            if (leadCapture && leadCaptureModal) {
                leadCapture.addEventListener('click', () => {
                    leadCaptureModal.style.display = 'flex';
                });
            }

            if (submitLead && nameInput && emailInput) {
                submitLead.addEventListener('click', () => {
                    const name = nameInput.value.trim();
                    const email = emailInput.value.trim();

                    if (!name || !email) {
                        alert('Please fill in all fields');
                        return;
                    }

                    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                        alert('Please enter a valid email address');
                        return;
                    }

                    const payload = {
                        name,
                        email,
                        productConcept: 'Automated Social Media Content Calendar for Mental Health Professionals'
                    };

                    fetch('https://salarybit.in/api/v1/lead-intake', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log('Success:', data);
                        alert('Thank you for your interest!');
                        nameInput.value = '';
                        emailInput.value = '';
                        leadCaptureModal.style.display = 'none';
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('There was an error submitting your information. Please try again later.');
                    });
                });
            }

            if (scheduleButton) {
                scheduleButton.addEventListener('click', () => {
                    const scheduleDate = document.getElementById('schedule-date').value;
                    const scheduleTime = document.getElementById('schedule-time').value;
                    const postContent = document.getElementById('post-content').value;

                    if (!scheduleDate || !scheduleTime) {
                        alert('Please select both date and time');
                        return;
                    }

                    try {
                        const payload = {
                            scheduleDate,
                            scheduleTime,
                            postContent
                        };
                        localStorage.setItem('schedule', JSON.stringify(payload));
                        alert('Post scheduled successfully!');
                    } catch (error) {
                        console.error('Error saving to localStorage:', error);
                        alert('There was an error saving your schedule. Please try again.');
                    }
                });
            }

            if (checkCompliance) {
                checkCompliance.addEventListener('click', () => {
                    const postContent = document.getElementById('post-content').value.trim();

                    if (!postContent) {
                        alert('Please enter post content to check compliance');
                        return;
                    }

                    // Basic compliance check
                    const complianceIssues = [];
                    if (postContent.length > 280) {
                        complianceIssues.push('Post exceeds 280 characters (Twitter limit)');
                    }

                    if (complianceIssues.length > 0) {
                        alert('Compliance issues found:\n- ' + complianceIssues.join('\n- '));
                    } else {
                        alert('Post content appears compliant with basic guidelines');
                    }
                });
            }

            window.addEventListener('load', () => {
                try {
                    const schedule = localStorage.getItem('schedule');
                    if (schedule) {
                        const scheduleData = JSON.parse(schedule);
                        if (scheduleData.scheduleDate) {
                            document.getElementById('schedule-date').value = scheduleData.scheduleDate;
                        }
                        if (scheduleData.scheduleTime) {
                            document.getElementById('schedule-time').value = scheduleData.scheduleTime;
                        }
                        if (scheduleData.postContent) {
                            document.getElementById('post-content').value = scheduleData.postContent;
                        }
                    }
                } catch (error) {
                    console.error('Error loading from localStorage:', error);
                }
            });

            // Close modal when clicking outside
            if (leadCaptureModal) {
                leadCaptureModal.addEventListener('click', (e) => {
                    if (e.target === leadCaptureModal) {
                        leadCaptureModal.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
