<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Social Media Content Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
        }
        section {
            margin-bottom: 1em;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 0.5em;
            margin-bottom: 0.5em;
            border: 1px solid #fff;
            border-radius: 0.5em;
            background-color: #666;
            color: #fff;
        }
        button {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 0.5em;
            border-radius: 0.5em;
            cursor: pointer;
        }
        button:hover {
            background-color: #777;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #555;
            padding: 1em;
            border-radius: 0.5em;
            width: 90%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <header style="background-color: #333; color: #fff; padding: 1em; text-align: center;">
        <h1>Automated Social Media Content Calendar for Solopreneurs</h1>
    </header>
    <main style="display: flex; flex-direction: column; align-items: center; padding: 2em; background-color: #444;">
        <h2>Plan, Create, and Schedule Your Social Media Content in Advance</h2>
        <section style="background-color: #555; padding: 1em; border-radius: 0.5em; margin-bottom: 1em; width: 100%;">
            <h3>Content Library</h3>
            <input type="text" id="content-library" placeholder="Search for customizable templates and ideas">
            <button id="search-content">Search</button>
        </section>
        <section style="background-color: #555; padding: 1em; border-radius: 0.5em; margin-bottom: 1em; width: 100%;">
            <h3>AI-Powered Content Suggestions</h3>
            <input type="text" id="niche" placeholder="Enter your niche">
            <input type="text" id="audience" placeholder="Enter your target audience">
            <button id="get-suggestions">Get Suggestions</button>
        </section>
        <section style="background-color: #555; padding: 1em; border-radius: 0.5em; margin-bottom: 1em; width: 100%;">
            <h3>Drag-and-Drop Calendar Interface</h3>
            <div style="width: 100%; height: 200px; background-color: #666; border: 1px solid #fff; border-radius: 0.5em; overflow: auto;">
                <!-- calendar interface will be generated dynamically -->
            </div>
        </section>
        <button id="lead-capture">Get Started</button>
        <div id="lead-capture-modal">
            <div class="modal-content">
                <h3>Get Started with Automated Social Media Content Calendar</h3>
                <input type="text" id="name" placeholder="Enter your name">
                <input type="email" id="email" placeholder="Enter your email">
                <button id="submit-lead">Submit</button>
                <button id="close-modal" style="margin-top: 0.5em; background-color: #888;">Close</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const leadCaptureButton = document.getElementById('lead-capture');
            const submitLeadButton = document.getElementById('submit-lead');
            const closeModalButton = document.getElementById('close-modal');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const contentLibraryInput = document.getElementById('content-library');
            const nicheInput = document.getElementById('niche');
            const audienceInput = document.getElementById('audience');
            const searchContentButton = document.getElementById('search-content');
            const getSuggestionsButton = document.getElementById('get-suggestions');

            function showModal() {
                leadCaptureModal.style.display = 'flex';
            }

            function hideModal() {
                leadCaptureModal.style.display = 'none';
            }

            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            function handleSubmit() {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                const contentLibrary = contentLibraryInput.value.trim();
                const niche = nicheInput.value.trim();
                const audience = audienceInput.value.trim();

                if (!name || !email) {
                    alert('Please enter both name and email');
                    return;
                }

                if (!validateEmail(email)) {
                    alert('Please enter a valid email address');
                    return;
                }

                const payload = {
                    name,
                    email,
                    contentLibrary,
                    niche,
                    audience,
                    productConcept: 'Automated Social Media Content Calendar'
                };

                fetch('https://salarybit.in/api/v1/lead-intake', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Success:', data);
                    alert('Thank you for your interest! We will contact you soon.');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('There was an error submitting your information. Please try again later.');
                });

                try {
                    localStorage.setItem('name', name);
                    localStorage.setItem('email', email);
                    localStorage.setItem('contentLibrary', contentLibrary);
                    localStorage.setItem('niche', niche);
                    localStorage.setItem('audience', audience);
                } catch (e) {
                    console.error('Error saving to localStorage:', e);
                }

                hideModal();
            }

            function loadStoredData() {
                try {
                    const storedName = localStorage.getItem('name');
                    const storedEmail = localStorage.getItem('email');
                    const storedContentLibrary = localStorage.getItem('contentLibrary');
                    const storedNiche = localStorage.getItem('niche');
                    const storedAudience = localStorage.getItem('audience');

                    if (storedName) nameInput.value = storedName;
                    if (storedEmail) emailInput.value = storedEmail;
                    if (storedContentLibrary) contentLibraryInput.value = storedContentLibrary;
                    if (storedNiche) nicheInput.value = storedNiche;
                    if (storedAudience) audienceInput.value = storedAudience;
                } catch (e) {
                    console.error('Error loading from localStorage:', e);
                }
            }

            leadCaptureButton.addEventListener('click', showModal);
            submitLeadButton.addEventListener('click', handleSubmit);
            closeModalButton.addEventListener('click', hideModal);
            searchContentButton.addEventListener('click', () => {
                console.log('Searching content library for:', contentLibraryInput.value);
            });
            getSuggestionsButton.addEventListener('click', () => {
                console.log('Getting suggestions for niche:', nicheInput.value, 'and audience:', audienceInput.value);
            });

            leadCaptureModal.addEventListener('click', (e) => {
                if (e.target === leadCaptureModal) {
                    hideModal();
                }
            });

            loadStoredData();
        });
    </script>
</body>
</html>
