<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Social Media Content Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #444;
            color: #fff;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2em;
        }
        section {
            margin-bottom: 20px;
            background-color: #555;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        textarea, input[type="text"], input[type="number"], input[type="email"], select {
            width: 100%;
            padding: 0.5em;
            border: none;
            border-radius: 10px;
            background-color: #666;
            color: #fff;
            margin-bottom: 10px;
        }
        input[type="color"] {
            width: 50px;
            height: 30px;
            padding: 0.2em;
        }
        button {
            padding: 0.5em 1em;
            border: none;
            border-radius: 10px;
            background-color: #666;
            color: #fff;
            cursor: pointer;
            margin: 5px;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #555;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        .modal-content {
            display: flex;
            flex-direction: column;
        }
        .error-message {
            color: #ff6b6b;
            margin-top: 5px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <header style="background-color: #333; color: #fff; padding: 1em; text-align: center;">
        <h1>Automated Social Media Content Calendar for Mental Health Professionals</h1>
    </header>
    <main>
        <section>
            <h2>Library of Pre-approved Content</h2>
            <textarea id="content-library" placeholder="Enter your pre-approved content here..."></textarea>
        </section>
        <section>
            <h2>Scheduling System</h2>
            <div style="display: flex; gap: 10px;">
                <input id="schedule-frequency" type="number" min="1" placeholder="Frequency" style="width: 80px;">
                <select id="schedule-unit">
                    <option value="days">Days</option>
                    <option value="weeks">Weeks</option>
                    <option value="months">Months</option>
                </select>
            </div>
        </section>
        <section>
            <h2>Customizable Templates and Branding</h2>
            <input id="template-name" type="text" placeholder="Template Name">
            <div style="margin-top: 10px;">
                <label for="brand-color">Brand Color:</label>
                <input id="brand-color" type="color" value="#ffffff">
            </div>
        </section>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button id="save-settings">Save Settings</button>
            <button id="lead-capture">Get Started</button>
        </div>
        <div id="lead-capture-modal">
            <div class="modal-content">
                <h2>Get Started with Automated Social Media Content Calendar</h2>
                <input id="name" type="text" placeholder="Name">
                <div id="name-error" class="error-message"></div>
                <input id="email" type="email" placeholder="Email">
                <div id="email-error" class="error-message"></div>
                <button id="submit-lead">Submit</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentLibrary = document.getElementById('content-library');
            const scheduleFrequency = document.getElementById('schedule-frequency');
            const scheduleUnit = document.getElementById('schedule-unit');
            const templateName = document.getElementById('template-name');
            const brandColor = document.getElementById('brand-color');
            const saveSettings = document.getElementById('save-settings');
            const leadCapture = document.getElementById('lead-capture');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const submitLead = document.getElementById('submit-lead');
            const nameError = document.getElementById('name-error');
            const emailError = document.getElementById('email-error');

            // Load settings from localStorage with error handling
            try {
                const settings = localStorage.getItem('settings');
                if (settings) {
                    const parsedSettings = JSON.parse(settings);
                    if (parsedSettings.contentLibrary) contentLibrary.value = parsedSettings.contentLibrary;
                    if (parsedSettings.scheduleFrequency) scheduleFrequency.value = parsedSettings.scheduleFrequency;
                    if (parsedSettings.scheduleUnit) scheduleUnit.value = parsedSettings.scheduleUnit;
                    if (parsedSettings.templateName) templateName.value = parsedSettings.templateName;
                    if (parsedSettings.brandColor) brandColor.value = parsedSettings.brandColor;
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }

            // Save settings with error handling
            saveSettings.addEventListener('click', () => {
                try {
                    const settings = {
                        contentLibrary: contentLibrary.value,
                        scheduleFrequency: scheduleFrequency.value,
                        scheduleUnit: scheduleUnit.value,
                        templateName: templateName.value,
                        brandColor: brandColor.value,
                    };
                    localStorage.setItem('settings', JSON.stringify(settings));
                    alert('Settings saved successfully!');
                } catch (error) {
                    console.error('Error saving settings:', error);
                    alert('Error saving settings. Please try again.');
                }
            });

            // Show lead capture modal
            leadCapture.addEventListener('click', () => {
                leadCaptureModal.style.display = 'block';
            });

            // Validate and submit lead
            submitLead.addEventListener('click', async () => {
                let isValid = true;
                nameError.textContent = '';
                emailError.textContent = '';

                if (!nameInput.value.trim()) {
                    nameError.textContent = 'Name is required';
                    isValid = false;
                }

                if (!emailInput.value.trim()) {
                    emailError.textContent = 'Email is required';
                    isValid = false;
                } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
                    emailError.textContent = 'Please enter a valid email';
                    isValid = false;
                }

                if (!isValid) return;

                const lead = {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    productConcept: 'Automated Social Media Content Calendar for Mental Health Professionals',
                };

                try {
                    const response = await fetch('https://salarybit.in/api/v1/lead-intake', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(lead),
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('Lead submitted:', data);
                    alert('Thank you for your interest! We will contact you soon.');
                    leadCaptureModal.style.display = 'none';
                    nameInput.value = '';
                    emailInput.value = '';
                } catch (error) {
                    console.error('Error submitting lead:', error);
                    alert('Error submitting your information. Please try again later.');
                }
            });

            // Close modal when clicking outside
            window.addEventListener('click', (event) => {
                if (event.target === leadCaptureModal) {
                    leadCaptureModal.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
