<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Social Media Content Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #333;
            color: #fff;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #2f2f2f;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        section {
            background-color: #444;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #555;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #666;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #lead-capture-modal > div {
            background-color: #444;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Automated Social Media Content Calendar for Mental Health Professionals</h1>
    </header>
    <main>
        <section>
            <h2>Content Suggestion Engine</h2>
            <input type="text" id="topic" placeholder="Enter topic or keyword">
            <button id="suggest">Get Suggestions</button>
            <div id="suggestions"></div>
        </section>
        <section>
            <h2>Compliance Checker</h2>
            <textarea id="content" placeholder="Enter content to check"></textarea>
            <button id="check">Check Compliance</button>
            <div id="compliance"></div>
        </section>
        <section>
            <h2>Analytics and Insights</h2>
            <button id="analytics">View Analytics</button>
            <div id="analytics-data"></div>
        </section>
        <button id="lead-capture">Get Started</button>
        <div id="lead-capture-modal">
            <div>
                <h2>Get Started</h2>
                <input type="text" id="name" placeholder="Enter name">
                <input type="email" id="email" placeholder="Enter email">
                <button id="submit">Submit</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const topicInput = document.getElementById('topic');
            const suggestButton = document.getElementById('suggest');
            const suggestionsDiv = document.getElementById('suggestions');
            const contentInput = document.getElementById('content');
            const checkButton = document.getElementById('check');
            const complianceDiv = document.getElementById('compliance');
            const analyticsButton = document.getElementById('analytics');
            const analyticsDataDiv = document.getElementById('analytics-data');
            const leadCaptureButton = document.getElementById('lead-capture');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const submitButton = document.getElementById('submit');

            function safeLocalStorageGet(key) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.error('LocalStorage error:', e);
                    return null;
                }
            }

            function safeLocalStorageSet(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.error('LocalStorage error:', e);
                }
            }

            suggestButton.addEventListener('click', () => {
                const topic = topicInput.value.trim();
                if (!topic) {
                    suggestionsDiv.innerHTML = '<p>Please enter a topic</p>';
                    return;
                }

                const suggestions = [];
                for (let i = 0; i < 5; i++) {
                    suggestions.push(`Suggestion ${i + 1} for ${topic}`);
                }

                suggestionsDiv.innerHTML = '';
                suggestions.forEach(suggestion => {
                    const p = document.createElement('p');
                    p.textContent = suggestion;
                    suggestionsDiv.appendChild(p);
                });

                safeLocalStorageSet('topic', topic);
            });

            checkButton.addEventListener('click', () => {
                const content = contentInput.value.trim();
                if (!content) {
                    complianceDiv.textContent = 'Please enter content to check';
                    return;
                }

                const compliance = 'Compliant';
                complianceDiv.textContent = compliance;
                safeLocalStorageSet('content', content);
            });

            analyticsButton.addEventListener('click', () => {
                analyticsDataDiv.textContent = 'Loading analytics data...';

                // Simulate API call
                setTimeout(() => {
                    analyticsDataDiv.textContent = 'Sample analytics data: Engagement rate: 5.2%, Reach: 1,200 users';
                }, 500);
            });

            leadCaptureButton.addEventListener('click', () => {
                leadCaptureModal.style.display = 'flex';
            });

            submitButton.addEventListener('click', () => {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();

                if (!name || !email) {
                    alert('Please enter both name and email');
                    return;
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    alert('Please enter a valid email address');
                    return;
                }

                const payload = {
                    product: 'Automated Social Media Content Calendar for Mental Health Professionals',
                    name,
                    email
                };

                submitButton.disabled = true;
                submitButton.textContent = 'Submitting...';

                fetch('https://salarybit.in/api/v1/lead-intake', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Thank you for your interest! We will contact you soon.');
                    nameInput.value = '';
                    emailInput.value = '';
                    leadCaptureModal.style.display = 'none';
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('There was an error submitting your information. Please try again.');
                })
                .finally(() => {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Submit';
                });
            });

            // Close modal when clicking outside
            leadCaptureModal.addEventListener('click', (e) => {
                if (e.target === leadCaptureModal) {
                    leadCaptureModal.style.display = 'none';
                }
            });

            // Load saved data
            const topic = safeLocalStorageGet('topic');
            if (topic) {
                topicInput.value = topic;
            }

            const content = safeLocalStorageGet('content');
            if (content) {
                contentInput.value = content;
            }
        });
    </script>
</body>
</html>
