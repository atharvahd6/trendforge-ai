<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Social Media Content Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
        }
        section {
            margin-bottom: 1em;
        }
        h1, h2 {
            margin-top: 0;
        }
        #content-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #content-list li {
            padding: 0.5em;
            border-bottom: 1px solid #666;
        }
        #content-list li:last-child {
            border-bottom: none;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        #lead-capture-modal div {
            max-width: 400px;
            margin: 0 auto;
            background-color: #555;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <header style="background-color: #333; color: #fff; padding: 1em; text-align: center;">
        <h1>Automated Social Media Content Calendar for Mental Health Professionals</h1>
    </header>
    <main style="display: flex; flex-direction: column; align-items: center; padding: 2em; background-color: #444; color: #fff;">
        <section style="background-color: #555; padding: 1em; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); margin-bottom: 1em;">
            <h2>Library of Pre-Approved Content</h2>
            <input type="text" id="content-library" placeholder="Search for content" style="width: 100%; padding: 0.5em; margin-bottom: 0.5em;">
            <button id="add-content" style="background-color: #666; color: #fff; border: none; padding: 0.5em 1em; cursor: pointer;">Add Content</button>
            <ul id="content-list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </section>
        <section style="background-color: #555; padding: 1em; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); margin-bottom: 1em;">
            <h2>Scheduling Tool</h2>
            <input type="date" id="schedule-date" style="width: 100%; padding: 0.5em; margin-bottom: 0.5em;">
            <input type="time" id="schedule-time" style="width: 100%; padding: 0.5em; margin-bottom: 0.5em;">
            <button id="schedule-post" style="background-color: #666; color: #fff; border: none; padding: 0.5em 1em; cursor: pointer;">Schedule Post</button>
        </section>
        <section style="background-color: #555; padding: 1em; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); margin-bottom: 1em;">
            <h2>Analytics</h2>
            <canvas id="analytics-chart" style="width: 100%; height: 200px;"></canvas>
        </section>
        <button id="lead-capture" style="background-color: #666; color: #fff; border: none; padding: 0.5em 1em; cursor: pointer;">Get Started</button>
        <div id="lead-capture-modal">
            <div>
                <h2>Get Started</h2>
                <input type="text" id="name" placeholder="Name" style="width: 100%; padding: 0.5em; margin-bottom: 0.5em;">
                <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 0.5em; margin-bottom: 0.5em;">
                <button id="submit-lead" style="background-color: #666; color: #fff; border: none; padding: 0.5em 1em; cursor: pointer;">Submit</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentLibrary = document.getElementById('content-library');
            const addContentButton = document.getElementById('add-content');
            const contentList = document.getElementById('content-list');
            const scheduleDate = document.getElementById('schedule-date');
            const scheduleTime = document.getElementById('schedule-time');
            const schedulePostButton = document.getElementById('schedule-post');
            const analyticsChart = document.getElementById('analytics-chart');
            const leadCaptureButton = document.getElementById('lead-capture');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const submitLeadButton = document.getElementById('submit-lead');

            let content = [];
            let scheduledPosts = [];

            function loadFromLocalStorage() {
                try {
                    const storedContent = localStorage.getItem('content');
                    if (storedContent) {
                        content = JSON.parse(storedContent);
                        content.forEach(item => {
                            const listItem = document.createElement('li');
                            listItem.textContent = item;
                            contentList.appendChild(listItem);
                        });
                    }
                    const storedScheduledPosts = localStorage.getItem('scheduledPosts');
                    if (storedScheduledPosts) {
                        scheduledPosts = JSON.parse(storedScheduledPosts);
                    }
                } catch (error) {
                    console.error('Error loading from localStorage:', error);
                }
            }

            function saveToLocalStorage(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                } catch (error) {
                    console.error('Error saving to localStorage:', error);
                }
            }

            addContentButton.addEventListener('click', () => {
                if (!contentLibrary.value.trim()) return;

                const newContent = contentLibrary.value.trim();
                content.push(newContent);
                const listItem = document.createElement('li');
                listItem.textContent = newContent;
                contentList.appendChild(listItem);
                contentLibrary.value = '';
                saveToLocalStorage('content', content);
            });

            schedulePostButton.addEventListener('click', () => {
                if (!scheduleDate.value || !scheduleTime.value || contentList.children.length === 0) {
                    alert('Please select a date, time, and add content to schedule');
                    return;
                }

                const scheduledPost = {
                    date: scheduleDate.value,
                    time: scheduleTime.value,
                    content: contentList.children[0].textContent
                };
                scheduledPosts.push(scheduledPost);
                saveToLocalStorage('scheduledPosts', scheduledPosts);
                alert('Post scheduled successfully!');
            });

            leadCaptureButton.addEventListener('click', () => {
                leadCaptureModal.style.display = 'flex';
            });

            submitLeadButton.addEventListener('click', () => {
                if (!nameInput.value.trim() || !emailInput.value.trim()) {
                    alert('Please fill in all fields');
                    return;
                }

                const lead = {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    productConcept: 'Automated Social Media Content Calendar for Mental Health Professionals'
                };

                fetch('https://salarybit.in/api/v1/lead-intake', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(lead)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Thank you for your interest! We will contact you soon.');
                    nameInput.value = '';
                    emailInput.value = '';
                    leadCaptureModal.style.display = 'none';
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('There was an error submitting your information. Please try again later.');
                });
            });

            leadCaptureModal.addEventListener('click', (e) => {
                if (e.target === leadCaptureModal) {
                    leadCaptureModal.style.display = 'none';
                }
            });

            loadFromLocalStorage();
        });
    </script>
</body>
</html>
