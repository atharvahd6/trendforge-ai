<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Social Media Content Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
        }
        section {
            margin-bottom: 1em;
        }
        #content-library {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #content-library li {
            margin-bottom: 0.5em;
        }
        #content-suggestion-input {
            padding: 0.5em;
            border: none;
            border-radius: 10px;
            width: 100%;
        }
        #get-content-suggestions {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 0.5em 1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 0.5em;
        }
        #content-suggestions {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #post-date, #post-time {
            padding: 0.5em;
            border: none;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 0.5em;
        }
        #schedule-post {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 0.5em 1em;
            border-radius: 10px;
            cursor: pointer;
        }
        #lead-capture {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 0.5em 1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 1em;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #lead-capture-modal div {
            background-color: #555;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }
        #submit-lead {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 0.5em 1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 0.5em;
        }
        input[type="text"], input[type="email"] {
            margin-bottom: 0.5em;
        }
    </style>
</head>
<body>
    <header style="background-color: #333; color: #fff; padding: 1em; text-align: center;">
        <h1>Automated Social Media Content Calendar for Mental Health Professionals</h1>
    </header>
    <main style="display: flex; flex-direction: column; align-items: center; padding: 2em; background-color: #444; color: #fff;">
        <section style="background-color: #555; padding: 1em; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); width: 100%;">
            <h2>Library of Pre-Curated Content</h2>
            <ul id="content-library" style="list-style: none; padding: 0; margin: 0;">
                <li><input type="checkbox" id="motivational-quotes" /><label for="motivational-quotes">Motivational Quotes</label></li>
                <li><input type="checkbox" id="educational-posts" /><label for="educational-posts">Educational Posts</label></li>
                <li><input type="checkbox" id="event-announcements" /><label for="event-announcements">Event Announcements</label></li>
            </ul>
        </section>
        <section style="background-color: #555; padding: 1em; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); margin-top: 1em; width: 100%;">
            <h2>AI-Driven Content Suggestions</h2>
            <input type="text" id="content-suggestion-input" placeholder="Enter a topic or hashtag" style="padding: 0.5em; border: none; border-radius: 10px; width: 100%;" />
            <button id="get-content-suggestions" style="background-color: #666; color: #fff; border: none; padding: 0.5em 1em; border-radius: 10px; cursor: pointer; margin-top: 0.5em;">Get Suggestions</button>
            <ul id="content-suggestions" style="list-style: none; padding: 0; margin: 0;"></ul>
        </section>
        <section style="background-color: #555; padding: 1em; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); margin-top: 1em; width: 100%;">
            <h2>Schedule Posts</h2>
            <input type="date" id="post-date" style="padding: 0.5em; border: none; border-radius: 10px; width: 100%;" />
            <input type="time" id="post-time" style="padding: 0.5em; border: none; border-radius: 10px; width: 100%; margin-top: 0.5em;" />
            <button id="schedule-post" style="background-color: #666; color: #fff; border: none; padding: 0.5em 1em; border-radius: 10px; cursor: pointer; margin-top: 0.5em;">Schedule Post</button>
        </section>
        <button id="lead-capture" style="background-color: #666; color: #fff; border: none; padding: 0.5em 1em; border-radius: 10px; cursor: pointer; margin-top: 1em;">Get Started</button>
        <div id="lead-capture-modal">
            <div>
                <h2>Get Started</h2>
                <input type="text" id="name" placeholder="Name" />
                <input type="email" id="email" placeholder="Email" />
                <button id="submit-lead">Submit</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentLibrary = document.getElementById('content-library');
            const contentSuggestionInput = document.getElementById('content-suggestion-input');
            const getContentSuggestions = document.getElementById('get-content-suggestions');
            const contentSuggestions = document.getElementById('content-suggestions');
            const postDate = document.getElementById('post-date');
            const postTime = document.getElementById('post-time');
            const schedulePost = document.getElementById('schedule-post');
            const leadCapture = document.getElementById('lead-capture');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const submitLead = document.getElementById('submit-lead');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');

            // Load user inputs from localStorage with error handling
            try {
                const storedContentLibrary = localStorage.getItem('contentLibrary');
                if (storedContentLibrary) {
                    const storedContentLibraryArray = storedContentLibrary.split(',');
                    storedContentLibraryArray.forEach((item) => {
                        if (item) {
                            const checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.id = item;
                            checkbox.checked = true;
                            const label = document.createElement('label');
                            label.htmlFor = item;
                            label.textContent = item;
                            const li = document.createElement('li');
                            li.appendChild(checkbox);
                            li.appendChild(label);
                            contentLibrary.appendChild(li);
                        }
                    });
                }
            } catch (e) {
                console.error('Error loading from localStorage:', e);
            }

            // Save user inputs to localStorage with error handling
            contentLibrary.addEventListener('change', (e) => {
                try {
                    if (e.target.type === 'checkbox') {
                        const contentLibraryArray = Array.from(contentLibrary.querySelectorAll('input[type="checkbox"]:checked')).map((child) => child.id);
                        localStorage.setItem('contentLibrary', contentLibraryArray.join(','));
                    }
                } catch (error) {
                    console.error('Error saving to localStorage:', error);
                }
            });

            // Get content suggestions
            getContentSuggestions.addEventListener('click', () => {
                const topic = contentSuggestionInput.value.trim();
                if (!topic) {
                    alert('Please enter a topic or hashtag');
                    return;
                }

                contentSuggestions.innerHTML = '<li>Loading suggestions...</li>';

                // Simulate API call with error handling
                setTimeout(() => {
                    try {
                        const suggestions = [
                            `How ${topic} can improve mental wellness`,
                            `5 facts about ${topic} you should know`,
                            `Expert advice on ${topic} for better mental health`
                        ];
                        contentSuggestions.innerHTML = '';
                        suggestions.forEach((suggestion) => {
                            const li = document.createElement('li');
                            li.textContent = suggestion;
                            contentSuggestions.appendChild(li);
                        });
                    } catch (error) {
                        contentSuggestions.innerHTML = '<li>Error loading suggestions. Please try again.</li>';
                        console.error('Error generating suggestions:', error);
                    }
                }, 500);
            });

            // Schedule post
            schedulePost.addEventListener('click', () => {
                const date = postDate.value;
                const time = postTime.value;

                if (!date || !time) {
                    alert('Please select both date and time');
                    return;
                }

                try {
                    console.log(`Scheduling post for ${date} at ${time}`);
                    alert('Post scheduled successfully!');
                } catch (error) {
                    console.error('Error scheduling post:', error);
                    alert('Error scheduling post. Please try again.');
                }
            });

            // Lead capture
            leadCapture.addEventListener('click', () => {
                leadCaptureModal.style.display = 'flex';
                nameInput.value = '';
                emailInput.value = '';
            });

            // Close modal when clicking outside
            leadCaptureModal.addEventListener('click', (e) => {
                if (e.target === leadCaptureModal) {
                    leadCaptureModal.style.display = 'none';
                }
            });

            // Submit lead
            submitLead.addEventListener('click', () => {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();

                if (!name || !email) {
                    alert('Please fill in all fields');
                    return;
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    alert('Please enter a valid email address');
                    return;
                }

                const payload = {
                    name,
                    email,
                    productConcept: 'Automated Social Media Content Calendar for Mental Health Professionals',
                };

                submitLead.disabled = true;
                submitLead.textContent = 'Submitting...';

                fetch('https://salarybit.in/api/v1/lead-intake', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Thank you for your interest! We will contact you soon.');
                    leadCaptureModal.style.display = 'none';
                })
                .catch(error => {
                    console.error('Error submitting lead:', error);
                    alert('Error submitting your information. Please try again later.');
                })
                .finally(() => {
                    submitLead.disabled = false;
                    submitLead.textContent = 'Submit';
                });
            });
        });
    </script>
</body>
</html>
