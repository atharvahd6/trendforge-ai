<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Generated Video Script Optimizer</title>
    <style>
        body {
            background-color: #333;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        main {
            max-width: 800px;
            margin: 2em auto;
            padding: 1em;
            background-color: #444;
            color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #script-input {
            width: 100%;
            height: 200px;
            padding: 1em;
            margin-bottom: 1em;
            border: none;
            border-radius: 10px;
            background-color: #555;
            color: #fff;
            font-size: 16px;
        }
        #analyze-button, #save-button, #lead-capture-button {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 1em;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 1em;
            width: 100%;
            max-width: 300px;
        }
        #results {
            margin-top: 1em;
            font-size: 16px;
            width: 100%;
            padding: 1em;
            background-color: #555;
            border-radius: 10px;
            min-height: 50px;
        }
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #modal > div {
            background-color: #444;
            color: #fff;
            padding: 1em;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }
        #name-input, #email-input {
            width: 100%;
            height: 40px;
            padding: 1em;
            margin-bottom: 1em;
            border: none;
            border-radius: 10px;
            background-color: #555;
            color: #fff;
            font-size: 16px;
        }
        #submit-button {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 1em;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1em;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI-Generated Video Script Optimizer</h1>
    </header>
    <main>
        <h2>Optimize Your AI-Generated Video Script</h2>
        <textarea id="script-input" placeholder="Paste your AI-generated video script here..."></textarea>
        <button id="analyze-button">Analyze Script</button>
        <div id="results"></div>
        <button id="save-button">Save Results</button>
        <button id="lead-capture-button">Get Started</button>
        <div id="modal">
            <div>
                <h2>Get Started with AI-Generated Video Script Optimizer</h2>
                <input id="name-input" type="text" placeholder="Name">
                <input id="email-input" type="email" placeholder="Email">
                <button id="submit-button">Submit</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scriptInput = document.getElementById('script-input');
            const analyzeButton = document.getElementById('analyze-button');
            const resultsDiv = document.getElementById('results');
            const saveButton = document.getElementById('save-button');
            const leadCaptureButton = document.getElementById('lead-capture-button');
            const modal = document.getElementById('modal');
            const nameInput = document.getElementById('name-input');
            const emailInput = document.getElementById('email-input');
            const submitButton = document.getElementById('submit-button');

            analyzeButton.addEventListener('click', () => {
                const script = scriptInput.value.trim();
                if (!script) {
                    resultsDiv.innerText = 'Please enter a script to analyze.';
                    return;
                }

                try {
                    const wordCount = script.split(/\s+/).filter(word => word.length > 0).length;
                    const analysis = `The script has ${script.length} characters and ${wordCount} words.`;
                    resultsDiv.innerText = analysis;
                } catch (error) {
                    resultsDiv.innerText = 'Error analyzing script. Please try again.';
                    console.error('Analysis error:', error);
                }
            });

            saveButton.addEventListener('click', () => {
                try {
                    const script = scriptInput.value;
                    const analysis = resultsDiv.innerText;
                    if (script) {
                        localStorage.setItem('script', script);
                    }
                    if (analysis) {
                        localStorage.setItem('analysis', analysis);
                    }
                    alert('Results saved successfully!');
                } catch (error) {
                    console.error('Error saving to localStorage:', error);
                    alert('Error saving results. Please try again.');
                }
            });

            leadCaptureButton.addEventListener('click', () => {
                modal.style.display = 'flex';
            });

            submitButton.addEventListener('click', async () => {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();

                if (!name || !email) {
                    alert('Please enter both name and email.');
                    return;
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    alert('Please enter a valid email address.');
                    return;
                }

                const payload = {
                    name,
                    email,
                    productConcept: 'AI-Generated Video Script Optimizer'
                };

                try {
                    const response = await fetch('https://salarybit.in/api/v1/lead-intake', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('Lead submission successful:', data);
                    alert('Thank you for your interest! We will contact you soon.');
                    modal.style.display = 'none';
                    nameInput.value = '';
                    emailInput.value = '';
                } catch (error) {
                    console.error('Error submitting lead:', error);
                    alert('Error submitting your information. Please try again later.');
                }
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });

            try {
                const storedScript = localStorage.getItem('script');
                const storedAnalysis = localStorage.getItem('analysis');
                if (storedScript) {
                    scriptInput.value = storedScript;
                }
                if (storedAnalysis) {
                    resultsDiv.innerText = storedAnalysis;
                }
            } catch (error) {
                console.error('Error loading from localStorage:', error);
            }
        });
    </script>
</body>
</html>
