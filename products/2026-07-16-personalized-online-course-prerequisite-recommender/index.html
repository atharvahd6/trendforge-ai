<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Online Course Prerequisite Recommender</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <header style="background-color: #2f2f2f; color: #ffffff; padding: 20px; text-align: center;">
        <h1>Personalized Online Course Prerequisite Recommender</h1>
    </header>
    <main style="background-color: #333333; color: #ffffff; padding: 20px; display: flex; flex-direction: column; align-items: center;">
        <h2 style="margin-bottom: 20px;">Get Personalized Course Recommendations</h2>
        <form id="course-form" style="display: flex; flex-direction: column; align-items: center;">
            <label for="student-name" style="margin-bottom: 10px;">Student Name:</label>
            <input type="text" id="student-name" required style="padding: 10px; margin-bottom: 20px; width: 50%; border: none; border-radius: 5px; background-color: #444444; color: #ffffff;">
            <label for="current-skills" style="margin-bottom: 10px;">Current Skills:</label>
            <textarea id="current-skills" required style="padding: 10px; margin-bottom: 20px; width: 50%; height: 100px; border: none; border-radius: 5px; background-color: #444444; color: #ffffff;"></textarea>
            <label for="desired-course" style="margin-bottom: 10px;">Desired Course:</label>
            <input type="text" id="desired-course" required style="padding: 10px; margin-bottom: 20px; width: 50%; border: none; border-radius: 5px; background-color: #444444; color: #ffffff;">
            <button type="submit" style="padding: 10px 20px; border: none; border-radius: 5px; background-color: #555555; color: #ffffff; cursor: pointer;">Get Recommendations</button>
        </form>
        <button id="lead-capture" style="padding: 10px 20px; border: none; border-radius: 5px; background-color: #555555; color: #ffffff; cursor: pointer; margin-top: 20px;">Get in Touch</button>
        <div id="modal" style="display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center;">
            <div style="background-color: #333333; color: #ffffff; padding: 20px; border-radius: 5px; width: 50%; max-width: 500px; height: auto; max-height: 80vh; overflow-y: auto;">
                <h2 style="margin-bottom: 20px;">Get in Touch</h2>
                <form id="lead-form" style="display: flex; flex-direction: column; align-items: center;">
                    <label for="name" style="margin-bottom: 10px;">Name:</label>
                    <input type="text" id="name" required style="padding: 10px; margin-bottom: 20px; width: 80%; border: none; border-radius: 5px; background-color: #444444; color: #ffffff;">
                    <label for="email" style="margin-bottom: 10px;">Email:</label>
                    <input type="email" id="email" required style="padding: 10px; margin-bottom: 20px; width: 80%; border: none; border-radius: 5px; background-color: #444444; color: #ffffff;">
                    <label for="phone" style="margin-bottom: 10px;">Phone:</label>
                    <input type="tel" id="phone" style="padding: 10px; margin-bottom: 20px; width: 80%; border: none; border-radius: 5px; background-color: #444444; color: #ffffff;">
                    <button type="submit" style="padding: 10px 20px; border: none; border-radius: 5px; background-color: #555555; color: #ffffff; cursor: pointer;">Submit</button>
                </form>
                <button id="close-modal" style="margin-top: 10px; padding: 5px 10px; background-color: #666; color: white; border: none; border-radius: 3px; cursor: pointer;">Close</button>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const courseForm = document.getElementById('course-form');
            const leadCapture = document.getElementById('lead-capture');
            const modal = document.getElementById('modal');
            const leadForm = document.getElementById('lead-form');
            const closeModal = document.getElementById('close-modal');

            if (courseForm) {
                courseForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    try {
                        const studentName = document.getElementById('student-name').value;
                        const currentSkills = document.getElementById('current-skills').value;
                        const desiredCourse = document.getElementById('desired-course').value;

                        if (typeof localStorage !== 'undefined') {
                            localStorage.setItem('studentName', studentName);
                            localStorage.setItem('currentSkills', currentSkills);
                            localStorage.setItem('desiredCourse', desiredCourse);
                        }

                        alert('Course recommendations will be provided based on your input.');
                    } catch (error) {
                        console.error('Error in course form submission:', error);
                        alert('An error occurred. Please try again.');
                    }
                });
            }

            if (leadCapture) {
                leadCapture.addEventListener('click', () => {
                    if (modal) {
                        modal.style.display = 'flex';
                    }
                });
            }

            if (closeModal) {
                closeModal.addEventListener('click', () => {
                    if (modal) {
                        modal.style.display = 'none';
                    }
                });
            }

            if (leadForm) {
                leadForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    try {
                        const name = document.getElementById('name').value;
                        const email = document.getElementById('email').value;
                        const phone = document.getElementById('phone').value;

                        if (!name || !email) {
                            alert('Please fill in all required fields.');
                            return;
                        }

                        const response = await fetch('https://salarybit.in/api/v1/lead-intake', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                productConcept: 'Personalized Online Course Prerequisite Recommender',
                                name: name,
                                email: email,
                                phone: phone
                            })
                        });

                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }

                        const data = await response.json();
                        console.log(data);
                        if (modal) {
                            modal.style.display = 'none';
                        }
                        alert('Thank you for getting in touch!');
                    } catch (error) {
                        console.error('Error submitting lead:', error);
                        alert('Error submitting lead. Please try again.');
                    }
                });
            }

            try {
                if (typeof localStorage !== 'undefined') {
                    const studentName = localStorage.getItem('studentName');
                    const currentSkills = localStorage.getItem('currentSkills');
                    const desiredCourse = localStorage.getItem('desiredCourse');

                    if (studentName) {
                        document.getElementById('student-name').value = studentName;
                    }
                    if (currentSkills) {
                        document.getElementById('current-skills').value = currentSkills;
                    }
                    if (desiredCourse) {
                        document.getElementById('desired-course').value = desiredCourse;
                    }
                }
            } catch (error) {
                console.error('Error accessing localStorage:', error);
            }
        });
    </script>
</body>
</html>
