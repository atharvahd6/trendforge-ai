<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Online Review Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2f2f2f;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        main {
            background-color: #3f3f3f;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        section {
            background-color: #4f4f4f;
            color: #ffffff;
            padding: 20px;
            border: 1px solid #5f5f5f;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input[type="text"],
        input[type="email"],
        select {
            background-color: #5f5f5f;
            color: #ffffff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        input[type="checkbox"] {
            margin-right: 10px;
        }
        button {
            background-color: #6f6f6f;
            color: #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #7f7f7f;
        }
        #lead-capture-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #lead-capture-modal > div {
            background-color: #4f4f4f;
            color: #ffffff;
            padding: 20px;
            border: 1px solid #5f5f5f;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .checkbox-group label {
            margin: 0 0 0 5px;
            display: inline;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI-Powered Online Review Analyzer</h1>
    </header>
    <main>
        <section>
            <h2>Business Information</h2>
            <label for="business-name">Business Name:</label>
            <input type="text" id="business-name" placeholder="Enter business name">

            <label for="business-type">Business Type:</label>
            <select id="business-type">
                <option value="restaurant">Restaurant</option>
                <option value="salon">Salon</option>
                <option value="medical-practice">Medical Practice</option>
                <option value="retail">Retail</option>
                <option value="other">Other</option>
            </select>
        </section>

        <section>
            <h2>Review Platforms</h2>
            <div class="checkbox-group">
                <input type="checkbox" id="google-my-business">
                <label for="google-my-business">Google My Business</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="yelp">
                <label for="yelp">Yelp</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="facebook">
                <label for="facebook">Facebook</label>
            </div>
        </section>

        <div>
            <button id="analyze-reviews">Analyze Reviews</button>
            <button id="get-recommendations">Get Recommendations</button>
            <button id="respond-to-reviews">Respond to Reviews</button>
            <button id="track-progress">Track Progress</button>
            <button id="lead-capture">Get Started</button>
        </div>

        <div id="lead-capture-modal">
            <div>
                <h2>Get Started</h2>
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name">

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">

                <button id="submit-lead">Submit</button>
                <button id="close-modal" style="margin-top: 10px;">Cancel</button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const businessNameInput = document.getElementById('business-name');
            const businessTypeSelect = document.getElementById('business-type');
            const googleMyBusinessCheckbox = document.getElementById('google-my-business');
            const yelpCheckbox = document.getElementById('yelp');
            const facebookCheckbox = document.getElementById('facebook');
            const analyzeReviewsButton = document.getElementById('analyze-reviews');
            const getRecommendationsButton = document.getElementById('get-recommendations');
            const respondToReviewsButton = document.getElementById('respond-to-reviews');
            const trackProgressButton = document.getElementById('track-progress');
            const leadCaptureButton = document.getElementById('lead-capture');
            const leadCaptureModal = document.getElementById('lead-capture-modal');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const submitLeadButton = document.getElementById('submit-lead');
            const closeModalButton = document.getElementById('close-modal');

            // Load saved data
            try {
                businessNameInput.value = localStorage.getItem('businessName') || '';
                businessTypeSelect.value = localStorage.getItem('businessType') || 'restaurant';
                googleMyBusinessCheckbox.checked = localStorage.getItem('googleMyBusiness') === 'true';
                yelpCheckbox.checked = localStorage.getItem('yelp') === 'true';
                facebookCheckbox.checked = localStorage.getItem('facebook') === 'true';
            } catch (e) {
                console.error('Error loading from localStorage:', e);
            }

            // Save data on input/change
            businessNameInput.addEventListener('input', () => {
                try {
                    localStorage.setItem('businessName', businessNameInput.value);
                } catch (e) {
                    console.error('Error saving to localStorage:', e);
                }
            });

            businessTypeSelect.addEventListener('change', () => {
                try {
                    localStorage.setItem('businessType', businessTypeSelect.value);
                } catch (e) {
                    console.error('Error saving to localStorage:', e);
                }
            });

            googleMyBusinessCheckbox.addEventListener('change', () => {
                try {
                    localStorage.setItem('googleMyBusiness', googleMyBusinessCheckbox.checked);
                } catch (e) {
                    console.error('Error saving to localStorage:', e);
                }
            });

            yelpCheckbox.addEventListener('change', () => {
                try {
                    localStorage.setItem('yelp', yelpCheckbox.checked);
                } catch (e) {
                    console.error('Error saving to localStorage:', e);
                }
            });

            facebookCheckbox.addEventListener('change', () => {
                try {
                    localStorage.setItem('facebook', facebookCheckbox.checked);
                } catch (e) {
                    console.error('Error saving to localStorage:', e);
                }
            });

            // Modal functionality
            leadCaptureButton.addEventListener('click', () => {
                leadCaptureModal.style.display = 'flex';
            });

            closeModalButton.addEventListener('click', () => {
                leadCaptureModal.style.display = 'none';
            });

            submitLeadButton.addEventListener('click', async () => {
                if (!nameInput.value.trim() || !emailInput.value.trim()) {
                    alert('Please fill in all fields');
                    return;
                }

                const payload = {
                    productConcept: 'AI-Powered Online Review Analyzer for Small Businesses',
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    businessName: businessNameInput.value.trim(),
                    businessType: businessTypeSelect.value,
                    googleMyBusiness: googleMyBusinessCheckbox.checked,
                    yelp: yelpCheckbox.checked,
                    facebook: facebookCheckbox.checked
                };

                try {
                    const response = await fetch('https://salarybit.in/api/v1/lead-intake', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('Success:', data);
                    alert('Thank you for your interest! We will contact you soon.');
                    leadCaptureModal.style.display = 'none';
                    nameInput.value = '';
                    emailInput.value = '';
                } catch (error) {
                    console.error('Error:', error);
                    alert('There was an error submitting your information. Please try again later.');
                }
            });

            // Close modal when clicking outside
            leadCaptureModal.addEventListener('click', (e) => {
                if (e.target === leadCaptureModal) {
                    leadCaptureModal.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
